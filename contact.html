<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Obsidian Pulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="contact">
    <div class="site-shell">
      <nav class="site-nav">
        <div class="container nav-inner">
          <a class="brand" href="index.html"><span class="material-symbols-outlined fill">graphic_eq</span> <span data-site-brand>Obsidian Pulse</span></a>
          <div class="nav-links" aria-label="Primary navigation">
            <a href="artists.html">Artists</a>
            <a href="releases.html">Releases</a>
            <a class="active" href="contact.html">Contact</a>
          </div>
          <div class="nav-actions">
            <a class="nav-action outline" href="#demo-form">Submit Demo</a>
            <button class="icon-button menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" data-menu-toggle><span class="material-symbols-outlined">menu</span></button>
          </div>
        </div>
        <div class="mobile-panel" data-mobile-menu>
          <div class="container">
            <a href="artists.html">Artists</a>
            <a href="releases.html">Releases</a>
            <a href="contact.html">Contact</a>
            <a href="#demo-form">Submit Demo</a>
          </div>
        </div>
      </nav>

      <main class="main page-main">
        <div class="container">
          <header class="page-header">
            <h1 class="page-title contact-title" data-contact-title>Transmit.</h1>
          </header>

          <section class="contact-layout">
            <aside class="contact-info">
              <div>
                <p class="label">Direct Line</p>
                <a class="direct-link" href="mailto:info@obsidianpulse.com" data-contact-email>info@obsidianpulse.com</a>
              </div>
              <div>
                <p class="label" data-contact-network-title>Network</p>
                <ul class="network-list" data-contact-socials></ul>
              </div>
              <p class="demo-note" data-contact-note>For demo submissions, please use the form provided.</p>
            </aside>

            <div class="contact-form-wrap" id="demo-form">
              <form class="demo-form" data-demo-form>
                <div class="field">
                  <input id="name" name="name" type="text" placeholder=" " required />
                  <label for="name">Name / Alias</label>
                </div>
                <div class="field">
                  <input id="email" name="email" type="email" placeholder=" " required />
                  <label for="email">Email Address</label>
                </div>
                <div class="field">
                  <input id="demo_link" name="demo_link" type="url" placeholder=" " required />
                  <label for="demo_link">Link to Demo (Soundcloud / Spotify)</label>
                </div>
                <div class="field">
                  <textarea id="message" name="message" rows="4" placeholder=" "></textarea>
                  <label for="message">Message (Optional)</label>
                </div>
                <div>
                  <button class="button" type="submit">Submit Demo <span class="material-symbols-outlined">arrow_outward</span></button>
                </div>
              </form>
            </div>
          </section>
        </div>
      </main>

      <footer class="site-footer" data-footer></footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
